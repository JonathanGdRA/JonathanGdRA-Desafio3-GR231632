<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InfinityGrid AquaTech - UDB</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header class="main-header">
        <div class="header-container">
            <h1 class="logo">AquaTech</h1>
            
            <input type="checkbox" id="menu-toggle" class="menu-checkbox">
            <label for="menu-toggle" class="menu-btn">
                <span class="icon-sprite"></span>
            </label>

            <nav class="nav-menu">
                <ul class="nav-list">
                    <li><a href="#" class="nav-link">Panel</a></li>
                    <li><a href="#" class="nav-link">Metricas</a></li>
                    <li><a href="#" class="nav-link">Dispositivos</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="contenedor-principal">
        
        <section class="introduccion">
            <h2>Sistema Infinity-Grid</h2>
            <p>Monitoreo de estanques en tiempo real</p>
        </section>

        <section class="grid-monitoreo">
            
            <article class="tarjeta-sensor">
                <div class="card-top">
                    <h3>Nivel de pH</h3>
                    <span class="badge verde">Estable</span>
                </div>
                <div class="valor">7.4</div>
                <p class="txt-abajo">Estado optimo</p>
            </article>

            <article class="tarjeta-sensor">
                <div class="card-top">
                    <h3>Oxigeno</h3>
                    <span class="badge naranja">Alerta</span>
                </div>
                <div class="valor">5.2 <span class="unidad">mg/L</span></div>
                <p class="txt-abajo">Revisar flujo</p>
            </article>

            <article class="tarjeta-sensor">
                <div class="card-top">
                    <h3>Temperatura</h3>
                    <span class="badge verde">Normal</span>
                </div>
                <div class="valor">24.8 <span class="unidad">°C</span></div>
                <p class="txt-abajo">Estanque central</p>
            </article>

        </section>

    </main>

    <footer class="pie-pagina">
        <p>AquaTech Cloud Solutions - UDB JG</p>
    </footer>

    </body>
</html>
